  /* Ken Burns Hero Background Effect */
  .bg-hero {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    background-image: 
        linear-gradient(to bottom, rgba(5,5,5,0.7) 0%, rgba(5,5,5,0.95) 100%),

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    animation: kenburns 40s infinite alternate ease-in-out;
    transform-origin: center;
    pointer-events: none;
  }

  @keyframes kenburns {
    0% { transform: scale(1); }
    100% { transform: scale(1.1); }
  }

  /* SVG Noise/Grain Overlay for editorial depth */
  .grain {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }

  /* Structural Content Layer */
  .content-layer {
    position: relative;
    z-index: 20;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Smooth Staggered Reveal Animations */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  .delay-100 { animation-delay: 100ms; }
  .delay-200 { animation-delay: 200ms; }
  .delay-300 { animation-delay: 300ms; }
  .delay-400 { animation-delay: 400ms; }
  .delay-500 { animation-delay: 500ms; }
  .delay-600 { animation-delay: 600ms; }
  .delay-700 { animation-delay: 700ms; }
  .delay-800 { animation-delay: 800ms; }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Luxury Link Hover Interaction */
  .luxury-link {
    position: relative;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  
  .luxury-link::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0%;
    height: 1px;
    background-color: #6B8EAD;
    transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  
  .luxury-link:hover {
    background-color: rgba(255, 255, 255, 0.02);
    padding-left: 1.5rem; /* Subttle indent on hover */
  }

  .luxury-link:hover::before {
    width: 100%;
  }

  /* Sharp Profile Box with B&W to Color reveal */
  .profile-box {
    filter: grayscale(80%) contrast(1.1) brightness(0.9);
    transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .profile-box:hover {
    filter: grayscale(0%) contrast(1) brightness(1);
    transform: scale(1.03);
  }

  /* Vertical/Horizontal Hairlines */
  .glass-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1) 50%, transparent);
  }
</style>
